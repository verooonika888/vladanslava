<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Оплата успішна | Владислава</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif; background-color: #050505; color: #ffffff;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; min-height: -webkit-fill-available; padding: 20px; position: relative;
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; opacity: 0.8;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8); z-index: -1;
        }
        .card {
            position: relative; z-index: 10; background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid #22c55e;
            padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .icon-wrapper {
            display: inline-flex; align-items: center; justify-content: center;
            width: 80px; height: 80px; border-radius: 50%; margin-bottom: 24px;
            background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3);
            filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.5)); color: #22c55e;
        }
        .icon-wrapper svg { width: 40px; height: 40px; }
        h1 { font-size: 24px; font-weight: 800; text-transform: uppercase; margin-bottom: 16px; letter-spacing: 1px; }
        p { font-size: 14px; color: #d1d5db; line-height: 1.6; margin-bottom: 32px; font-weight: 300; }
        strong { color: #ffffff; font-weight: 600; }
        .btn {
            display: block; width: 100%; padding: 18px; border-radius: 12px;
            text-decoration: none; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.2s ease; font-size: 14px;
            background-color: rgba(255, 255, 255, 0.1); color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn:active { transform: scale(0.95); background-color: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <img src="bg-mystic.jpg" alt="Фон" class="bg-image">
    <div class="bg-overlay"></div>

    <div class="card">
        <div class="icon-wrapper">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>

        <h1>Оплата успішна!</h1>
        
        <p>
            Дякую за довіру. Ваше місце заброньовано. <br><br>
            <strong>Я зв'яжусь з вами у Telegram найближчим часом</strong>, щоб узгодити дату та час нашої діагностики.
        </p>

        <a href="index.html" class="btn">Повернутися на сайт</a>
    </div>

</body>
</html>
