<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Оплата успішна | Владислава</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { redAccent: '#d32f2f', darkBg: '#0f0f0f', darkCard: '#1a1a1a' },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { color: #ffffff; background-color: #050505; }
        .glass-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .success-glow { filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.5)); }
    </style>
</head>
<body class="font-sans antialiased relative min-h-[100dvh] flex flex-col items-center justify-center p-4"> 

    <!-- ФОН (Зафіксований позаду) -->
    <div class="fixed inset-0 z-0">
        <img src="bg-mystic.jpg" alt="Фон" class="w-full h-full object-cover opacity-80">
        <div class="absolute inset-0 bg-black/80"></div>
    </div>

    <!-- КАРТКА УСПІХУ (Виведена на передній план z-10) -->
    <div class="relative z-10 glass-card p-8 md:p-10 rounded-3xl w-full max-w-[400px] text-center shadow-2xl border-t border-green-500/30">
        
        <!-- Іконка галочки -->
        <div class="mx-auto flex items-center justify-center w-20 h-20 bg-green-500/10 rounded-full border border-green-500/30 mb-6 success-glow">
            <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>

        <h1 class="text-2xl font-extrabold mb-4 uppercase tracking-wide">Оплата успішна!</h1>
        
        <!-- ОНОВЛЕНИЙ ТЕКСТ НА "ТИ" -->
        <p class="text-gray-300 text-sm leading-relaxed mb-8 font-light">
            Дякую за довіру. Твоє місце заброньовано. <br><br>
            <strong class="text-white font-semibold">Я зв'яжусь з тобою у Telegram найближчим часом</strong>, щоб узгодити дату та час нашої діагностики.<br><br>
            А поки переходь у мій Telegram-канал. Там багато цікавого!
        </p>

        <!-- Кнопка переходу в ТГ канал -->
        <a href="https://t.me/+_zEUS197GKRkYzQy" target="_blank" class="block w-full bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-4 rounded-xl uppercase tracking-wider transition transform active:scale-95">
            Перейти в TG канал
        </a>
    </div>

</body>
</html>
