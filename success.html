<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успішна | Владислава</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { redAccent: '#d32f2f', darkBg: '#0f0f0f', darkCard: '#1a1a1a' },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { color: #ffffff; background-color: #050505; }
        .glass-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .success-glow { filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.5)); }
    </style>
</head>
<body class="font-sans antialiased relative min-h-screen flex items-center justify-center p-4"> 

    <!-- ФОН (Такий самий як на головній) -->
    <img src="bg-mystic.jpg" alt="Фон" class="fixed inset-0 w-full h-full object-cover z-[-2] pointer-events-none opacity-80">
    <div class="fixed inset-0 w-full h-full bg-black/80 z-[-1] pointer-events-none"></div>

    <!-- КАРТКА УСПІХУ -->
    <div class="glass-card p-8 md:p-12 rounded-3xl w-full max-w-lg text-center shadow-2xl border-t border-green-500/30">
        
        <!-- Іконка галочки -->
        <div class="inline-flex items-center justify-center w-20 h-20 bg-green-500/10 rounded-full border border-green-500/30 mb-6 success-glow">
            <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>

        <h1 class="text-2xl md:text-3xl font-extrabold mb-4 uppercase tracking-wide">Оплата успішна!</h1>
        
        <p class="text-gray-300 text-sm md:text-base leading-relaxed mb-8 font-light">
            Дякую за довіру. Ваше місце заброньовано. <br><br>
            <strong class="text-white font-semibold">Я зв'яжусь з вами у Telegram найближчим часом</strong>, щоб узгодити дату та час нашої діагностики.
        </p>

        <a href="index.html" class="inline-block w-full bg-white/10 hover:bg-white/20 border border-white/20 text-white font-bold py-4 rounded-xl uppercase tracking-wider transition transform hover:scale-[1.02]">
            Повернутися на сайт
        </a>
    </div>

</body>
</html>
