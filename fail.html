<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помилка оплати | Владислава</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { redAccent: '#d32f2f', darkBg: '#0f0f0f', darkCard: '#1a1a1a' },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { color: #ffffff; background-color: #050505; }
        .glass-card { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .error-glow { filter: drop-shadow(0 0 15px rgba(211, 47, 47, 0.5)); }
    </style>
</head>
<body class="font-sans antialiased relative min-h-screen flex items-center justify-center p-4"> 

    <!-- ФОН -->
    <img src="bg-mystic.jpg" alt="Фон" class="fixed inset-0 w-full h-full object-cover z-[-2] pointer-events-none opacity-80">
    <div class="fixed inset-0 w-full h-full bg-black/80 z-[-1] pointer-events-none"></div>

    <!-- КАРТКА ПОМИЛКИ -->
    <div class="glass-card p-8 md:p-12 rounded-3xl w-full max-w-lg text-center shadow-2xl border-t border-redAccent/50">
        
        <!-- Іконка Хрестика -->
        <div class="inline-flex items-center justify-center w-20 h-20 bg-redAccent/10 rounded-full border border-redAccent/30 mb-6 error-glow">
            <svg class="w-10 h-10 text-redAccent" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </div>

        <h1 class="text-2xl md:text-3xl font-extrabold mb-4 uppercase tracking-wide">Сталася помилка</h1>
        
        <p class="text-gray-300 text-sm md:text-base leading-relaxed mb-8 font-light">
            На жаль, вашу транзакцію було відхилено банком, або сталася технічна помилка.<br><br>
            <strong class="text-white">Ваші кошти не були списані.</strong> Будь ласка, перевірте ліміти на картці для оплат в інтернеті або спробуйте іншу картку.
        </p>

        <a href="index.html" class="inline-block w-full bg-redAccent hover:bg-red-700 text-white font-bold py-4 rounded-xl uppercase tracking-wider transition transform hover:scale-[1.02] shadow-[0_0_15px_rgba(211,47,47,0.4)]">
            Спробувати ще раз
        </a>
    </div>

</body>
</html>
