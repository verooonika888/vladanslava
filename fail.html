<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Помилка оплати | Владислава</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Спеціальний фікс для екранів iPhone */
            min-height: -webkit-fill-available; 
            padding: 20px;
            position: relative;
        }
        /* Фіксовані фони */
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; opacity: 0.8;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8); z-index: -1;
        }
        /* Картка */
        .card {
            position: relative; z-index: 10;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid #d32f2f;
            padding: 40px 30px; border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Іконка */
        .icon-wrapper {
            display: inline-flex; align-items: center; justify-content: center;
            width: 80px; height: 80px; border-radius: 50%; margin-bottom: 24px;
            background: rgba(211, 47, 47, 0.1); border: 1px solid rgba(211, 47, 47, 0.3);
            filter: drop-shadow(0 0 15px rgba(211, 47, 47, 0.5)); color: #d32f2f;
        }
        .icon-wrapper svg { width: 40px; height: 40px; }
        /* Текст */
        h1 { font-size: 24px; font-weight: 800; text-transform: uppercase; margin-bottom: 16px; letter-spacing: 1px; }
        p { font-size: 14px; color: #d1d5db; line-height: 1.6; margin-bottom: 32px; font-weight: 300; }
        strong { color: #ffffff; font-weight: 600; }
        /* Кнопка */
        .btn {
            display: block; width: 100%; padding: 18px; border-radius: 12px;
            text-decoration: none; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.2s ease; font-size: 14px;
            background-color: #d32f2f; color: #ffffff;
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.4);
        }
        .btn:active { transform: scale(0.95); background-color: #b71c1c; }
    </style>
</head>
<body>

    <img src="bg-mystic.jpg" alt="Фон" class="bg-image">
    <div class="bg-overlay"></div>

    <div class="card">
        <div class="icon-wrapper">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </div>

        <h1>Сталася помилка</h1>
        
        <p>
            На жаль, вашу транзакцію було відхилено банком, або сталася технічна помилка.<br><br>
            <strong>Ваші кошти не були списані.</strong> Будь ласка, перевірте ліміти на картці або спробуйте іншу.
        </p>

        <a href="index.html" class="btn">Спробувати ще раз</a>
    </div>

</body>
</html>
